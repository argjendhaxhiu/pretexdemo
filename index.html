<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Serengeti report page with text flowing around a giraffe silhouette. Drag the giraffe to reflow."
    />
    <title>Serengeti Report — Pretext contour wrap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <canvas
      id="page"
      role="img"
      aria-label="Serengeti report page with text flowing around a giraffe silhouette. Drag the giraffe to reflow."
    ></canvas>
    <p class="hud">
      Serengeti report page with text flowing around a giraffe silhouette. Drag the giraffe to reflow. Powered by
      Pretext <code>layoutNextLine</code> — not CSS <code>shape-outside</code>.
    </p>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
